{% extends "base.html" %}

{% block title %}Edit Student - Student Management System{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Edit Student</h1>
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" value="{{ student.name }}" required>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" value="{{ student.email }}" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" value="{{ student.phone or '' }}">
        </div>

        <div class="form-group">
            <label for="course">Course *</label>
            <select id="course" name="course" required>
                <option value="">Select a course</option>
                <option value="B.Tech - CS" {% if student.course == 'B.Tech - CS' %}selected{% endif %}>B.Tech - Computer Science</option>
                <option value="B.Tech - IT" {% if student.course == 'B.Tech - IT' %}selected{% endif %}>B.Tech - Information Technology</option>
                <option value="B.Tech - ECE" {% if student.course == 'B.Tech - ECE' %}selected{% endif %}>B.Tech - Electronics</option>
                <option value="B.Tech - ME" {% if student.course == 'B.Tech - ME' %}selected{% endif %}>B.Tech - Mechanical</option>
                <option value="B.Com" {% if student.course == 'B.Com' %}selected{% endif %}>Bachelor of Commerce</option>
                <option value="B.A" {% if student.course == 'B.A' %}selected{% endif %}>Bachelor of Arts</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" value="{{ student.dob or '' }}">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Student</button>
            <a href="{{ url_for('view_student', student_id=student.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
